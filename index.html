<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>採用情報</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/work.css" />
  </head>
  <body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <!-- Top nav -->
    <nav class="top-nav">
      <button class="nav-btn" onclick="scrollToCard('recruit')">
        募集職種
        <span class="chevron">›</span>
      </button>
      <button class="nav-btn" onclick="scrollToCard('casual')">
        カジュアル面談
        <span class="chevron">›</span>
      </button>
      <button class="nav-btn nav-btn-close" onclick="closeSection()">－</button>
    </nav>

    <!-- Main -->
    <div class="section">
      <div class="cards-grid">
        <!-- Card 1: 募集職種 -->
        <div class="card" id="recruit" onclick="window.location = '#recruit'">
          <div class="blob blob-blue-small"></div>
          <div class="blob blob-blue-large"></div>
          <div class="blob blob-outline"></div>
          <img class="blob blob-img" src="" alt="" />

          <p class="card-label">Join Our Team</p>
          <h2 class="card-title">募集職種</h2>

          <div class="card-body">
            <p class="card-text"> 現在募集中の職種一覧をご確認いただけます。ご自身の経験や関心に合致するポジションがございましたら、応募をご検討ください。 </p>
          </div>
        </div>

        <!-- Card 2: カジュアル面談 -->
        <div class="card" id="casual" onclick="window.location = '#casual'">
          <div class="blob blob-blue-small"></div>
          <div class="blob blob-blue-large"></div>
          <div class="blob blob-outline"></div>
          <img class="blob blob-img" src="" alt="" />

          <p class="card-label">Casual Interview</p>
          <h2 class="card-title">カジュアル面談</h2>

          <div class="card-body">
            <p class="card-text"> 応募をご検討中の方に向けて、当社についてご理解を深めていただくためのカジュアル面談を実施<span class="card-link">しています。</span> </p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
